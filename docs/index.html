<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Multeam</title>
  <meta name="description" content="Gestão de multas de balneário para equipas" />
  <meta name="theme-color" content="#E63946" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Multeam" />
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icon-192.png" />
  <style>
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    body { margin: 0; padding: 0; background: #F0F1F6; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
    #root { min-height: 100vh; }
    #splash { position: fixed; inset: 0; background: linear-gradient(160deg, #1D3557 0%, #0a1628 100%); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 9999; transition: opacity .4s; }
    #splash.hide { opacity: 0; pointer-events: none; }
    #splash-icon { width: 80px; height: 80px; border-radius: 22px; background: #E63946; display: flex; align-items: center; justify-content: center; font-size: 38px; margin-bottom: 18px; box-shadow: 0 8px 32px rgba(230,57,70,0.5); }
    #splash h1 { color: #fff; font-size: 34px; font-weight: 900; margin: 0; letter-spacing: -1.5px; }
    #splash p { color: rgba(255,255,255,0.45); margin: 6px 0 0; font-size: 15px; }
  </style>
</head>
<body>
  <!-- Splash screen -->
  <div id="splash">
    <div id="splash-icon">🟥</div>
    <h1>Multeam</h1>
    <p>Gestão de multas de balneário</p>
  </div>

  <div id="root"></div>

  <!-- React 18 via CDN -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>

  <!-- App bundle -->
  <script src="app.js"></script>

  <!-- Hide splash after app loads -->
  <script>
    window.addEventListener('load', function() {
      setTimeout(function() {
        var s = document.getElementById('splash');
        if (s) { s.classList.add('hide'); setTimeout(function(){ s.remove(); }, 500); }
      }, 800);
    });

    // PWA Service Worker
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', function() {
        navigator.serviceWorker.register('sw.js').catch(function(){});
      });
    }
  </script>
</body>
</html>
